services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_TTS_API_BASE_URL: ${NEXT_PUBLIC_TTS_API_BASE_URL}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3001
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      TRUSTED_PROXY: "true"
    volumes:
      - backend-cache:/app/cache
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  backend-cache:
  caddy_data:
  caddy_config:
